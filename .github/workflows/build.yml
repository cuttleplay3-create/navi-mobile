name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: pip install briefcase

      - name: Create project
        run: briefcase create android --no-input

      - name: Build APK
        run: briefcase build android --no-input -r

      - name: Show build log
        if: failure()
        run: cat logs/*.build.log || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: navi-apk
          path: "**/*.apk"
          if-no-files-found: warn
